<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HSL App Pro</title>
<style>
:root{
  --bg:#0f172a;
  --panel:#020617;
  --card:#1e293b;
  --accent:#38bdf8;
  --text:#e2e8f0;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
header{background:var(--panel);padding:16px;text-align:center;font-weight:bold}
.container{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 60px)}
.sidebar{background:var(--panel);padding:15px;overflow:auto}
.sidebar button{width:100%;padding:10px;margin-bottom:10px;border:none;background:var(--card);color:white;border-radius:8px;cursor:pointer}
.sidebar button:hover{background:var(--accent);color:black}
.content{padding:20px;overflow:auto}
.card{background:var(--card);padding:20px;border-radius:12px;margin-bottom:15px}
.search{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:15px}
.accordion{cursor:pointer;padding:10px;background:#334155;border-radius:8px;margin-top:10px}
.panel{display:none;padding:10px}
.progress{height:6px;background:#334155;border-radius:4px;margin-bottom:10px}
.progress-bar{height:6px;background:var(--accent);width:0%}
</style>
</head>
<body>
<header>Historia Social Latinoamericana - App Pro</header>
<div class="container">
<div class="sidebar">
<input type="text" class="search" placeholder="Buscar..." oninput="buscar(this.value)">
<button onclick="cargar(1)">Unidad I</button>
<button onclick="cargar(2)">Unidad II</button>
<button onclick="cargar(3)">Unidad III</button>
</div>
<div class="content">
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<div id="app"></div>
</div>
</div>
<script>
const data={
1:[
{t:"Significado de la historia",c:`La historia es una disciplina científica que estudia los procesos del pasado para comprender el presente. Evoluciona desde relatos antiguos hasta una interpretación crítica basada en causas económicas y sociales. Permite entender fenómenos actuales como la desigualdad latinoamericana.`},
{t:"Historia social",c:`Se enfoca en el estudio de las estructuras sociales, la vida cotidiana y las relaciones económicas. Influenciada por el materialismo histórico, sostiene que la base económica condiciona la organización social.`},
{t:"Pensamiento social latinoamericano",c:`Surge como respuesta a la colonización y la dependencia. Busca explicar la identidad regional, criticar el dominio europeo y proponer modelos propios de desarrollo.`},
{t:"Acción individual",c:`La conquista fue impulsada por intereses privados más que estatales. Los conquistadores buscaban riqueza rápida, generando una colonización desorganizada y extractiva.`},
{t:"Encomienda",c:`Sistema mediante el cual indígenas eran obligados a tributar y trabajar. En teoría implicaba protección y evangelización, pero en la práctica fue un sistema de explotación.`},
{t:"Comercio colonial",c:`La economía estaba orientada a exportar metales preciosos a Europa. América funcionaba como proveedor de riqueza sin desarrollo industrial propio.`},
{t:"Feudalismo latinoamericano",c:`Tras la crisis minera, la tierra se vuelve central. Surgen latifundios, economía de subsistencia y poder local, generando estructuras similares al feudalismo.`},
{t:"Fin de la era colonial",c:`Se produce por la crisis de España, el contrabando, la influencia inglesa y el crecimiento económico local, preparando el camino para la independencia.`}
],
2:[
{t:"Deterioro de los imperios ibéricos",c:`España y Portugal pierden poder económico al no industrializarse. Dependían de Europa y usaban su riqueza en guerras, generando crisis estructural.`},
{t:"Situación de la colonia",c:`Existía fuerte desigualdad social. Las elites dominaban mientras la mayoría (indígenas, mestizos, esclavos) estaba excluida. El comercio era restringido.`},
{t:"Movimientos independentistas",c:`Resultado de un proceso largo de rebeliones y tensiones. Incluye levantamientos como Túpac Amaru y los comuneros.`},
{t:"Formación de los Estados",c:`Proceso fragmentado y conflictivo. Los virreinatos se dividen en múltiples países sin planificación unificada.`},
{t:"Transferencia del poder",c:`El poder pasa de los españoles a las elites criollas, manteniendo la desigualdad social existente.`},
{t:"Problemas estructurales",c:`Los nuevos Estados enfrentan debilidad institucional, falta de integración económica y dependencia externa.`},
{t:"Factores políticos",c:`Internos: conflictos sociales. Externos: Revolución Francesa, EE.UU. e invasión napoleónica.`},
{t:"Nacionalismo",c:`Ideología de las elites que buscaban autonomía política sin cambios sociales profundos.`},
{t:"Capitalismo emergente",c:`Tras la independencia, América Latina se integra al mercado mundial como exportadora de materias primas.`},
{t:"Positivismo",c:`Corriente que promueve orden y progreso, justificando gobiernos autoritarios modernizadores.`}
],
3:[
{t:"Transición al capitalismo",c:`Proceso mediante el cual América Latina pasa de estructuras coloniales a un sistema capitalista dependiente.`},
{t:"Capitalismo periférico",c:`Modelo basado en exportación de materias primas, dependencia tecnológica y subordinación a potencias.`},
{t:"Economía atlántica",c:`Europa industrial demanda materias primas, integrando a América Latina en una relación desigual.`},
{t:"Auge del siglo XVIII",c:`Expansión económica que fortalece a las elites y prepara el proceso independentista.`},
{t:"Cambio social",c:`Transformaciones profundas en estructura social, con persistencia de desigualdad y dependencia.`},
{t:"Desigualdad",c:`Se mantiene una elite dominante frente a una mayoría excluida.`},
{t:"Dependencia",c:`Las economías latinoamericanas dependen del mercado externo.`},
{t:"Latifundio",c:`La tierra sigue concentrada en pocas manos, consolidando poder económico.`},
{t:"Baja industrialización",c:`La región no desarrolla industria propia, manteniendo economías primarias.`},
{t:"Resultado",c:`América Latina queda definida por desigualdad, dependencia y debilidad estatal.`}
]
};

let current=0;

function cargar(n){
current=n;
const cont=document.getElementById('app');
cont.innerHTML='';
let i=0;
data[n].forEach(el=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<div class='accordion' onclick='toggle(this)'>${el.t}</div><div class='panel'>${el.c}</div>`;
cont.appendChild(card);
i++;
});
updateProgress();
}

function toggle(el){
const panel=el.nextElementSibling;
panel.style.display=panel.style.display==='block'?'none':'block';
}

function buscar(q){
q=q.toLowerCase();
const cont=document.getElementById('app');
cont.innerHTML='';
Object.values(data).flat().forEach(el=>{
if(el.t.toLowerCase().includes(q)||el.c.toLowerCase().includes(q)){
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<b>${el.t}</b><p>${el.c}</p>`;
cont.appendChild(card);
}
});
}

function updateProgress(){
const bar=document.getElementById('bar');
bar.style.width=(current/3*100)+'%';
}


// ===== MODO EXAMEN =====
let preguntas=[];
let indice=0;
let puntaje=0;

function iniciarExamen(){
  preguntas = Object.values(data).flat().map(el=>({
    pregunta:`¿Qué es: ${el.t}?`,
    respuesta:el.c
  }));
  preguntas.sort(()=>Math.random()-0.5);
  indice=0;
  puntaje=0;
  mostrarPregunta();
}

function mostrarPregunta(){
  const cont=document.getElementById('app');
  if(indice>=preguntas.length){
    cont.innerHTML=`<div class="card"><h2>Examen terminado</h2><p>Puntaje: ${puntaje} / ${preguntas.length}</p></div>`;
    return;
  }
  const p=preguntas[indice];
  cont.innerHTML=`
    <div class="card">
      <h3>${p.pregunta}</h3>
      <textarea id="resp" style="width:100%;height:100px;margin-top:10px"></textarea>
      <button onclick="corregir()" style="margin-top:10px">Corregir</button>
      <div id="feedback" style="margin-top:10px"></div>
      <button onclick="siguiente()" style="margin-top:10px">Siguiente</button>
    </div>
  `;
}

function corregir(){
  const user=document.getElementById('resp').value.toLowerCase();
  const correcta=preguntas[indice].respuesta.toLowerCase();

  let palabrasClave=correcta.split(' ').slice(0,8); // primeras palabras clave
  let aciertos=0;

  palabrasClave.forEach(p=>{
    if(user.includes(p)) aciertos++;
  });

  let resultado="";

  if(aciertos>4){
    resultado="✅ Correcto (bien explicado)";
    puntaje++;
  }else if(aciertos>2){
    resultado="🟡 Parcial (te faltó desarrollar más)";
  }else{
    resultado="❌ Incorrecto (muy incompleto)";
  }

  document.getElementById('feedback').innerHTML=`<b>${resultado}</b><p><b>Respuesta esperada:</b> ${preguntas[indice].respuesta}</p>`;
}

function siguiente(){
  indice++;
  mostrarPregunta();
}

// BOTÓN EXAMEN
const sidebar=document.querySelector('.sidebar');
const btn=document.createElement('button');
btn.innerText='Modo Examen';
btn.onclick=iniciarExamen;
sidebar.appendChild(btn);

</script>
</body>
</html>
